<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../styles/reg.css" />
    <title>Запись</title>
  </head>
  <body>
    <header id="header">
      <p class="logo">Здоровье</p>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="index.html#service">Услуги</a>
        <a href="index.html#doctor">Врачи</a>
        <a href="index.html#footer">Контакты</a>
      </nav>
    </header>
    <main>
      <div class="card">
        <form action="#" method="post">
            <h1>Запись</h1>         
          <p class="inf">Email:</p>
          <input class="input" type="email" required />
          <input class="input" type="text" required placeholder="Имя" />
          <input class="input" type="text" required placeholder="Фамилия" />
          <p class="inf">Номер телефона:</p>
          <input class="input"
            type="tel"
            pattern="\+7[0-9]{10}"
            placeholder="+7 (...) ... .. .."
          />
          <p class="zag">Выберете время записи:</р>
          <input class="input" required type="datetime-local" />
          <input id="input" type="submit" value="Записаться" />
        </form>
      </div> 
    </main>
    <footer id="footer">
      <div class="contacts">
        <h3>Контакты:</h3>
        <p class="inf">+371 67 123 456</p>
        <p class="inf">info@healthcare.lv</p>
        <p class="inf">ул. Бривибас 125, Рига, LV-1012, Латвия</p>
      </div>
    </footer>
  </body>
</html>
